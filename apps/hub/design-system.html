<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vadal Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet" />
  <link href="./ds-tokens.css" rel="stylesheet" />
  <link href="./ds-docs.css" rel="stylesheet" />
  <script>
    // apply saved theme before paint (no flash)
    try {
      if (localStorage.getItem('vadal-ds-theme') === 'dark') document.documentElement.classList.add('dark');
      if (localStorage.getItem('vadal-ds-hl') === '1') document.documentElement.classList.add('hl');
    } catch (e) {}
  </script>
</head>
<body>
  <div class="app" data-ds>
    <aside class="sidebar" id="sidebar">
      <a class="brand" href="#/overview">
        <span class="brand-mark"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.6"/><rect x="13" y="4" width="7" height="7" rx="1.6"/><rect x="4" y="13" width="7" height="7" rx="1.6"/><rect x="13" y="13" width="7" height="7" rx="1.6"/></svg></span>
        <span class="brand-name">Vadal <b>Design&nbsp;System</b></span>
      </a>
      <div class="side-search"><input id="navfilter" type="text" placeholder="Filter…" aria-label="Filter navigation" /></div>
      <nav id="nav" class="nav"></nav>
      <div class="side-foot">v0.1 · Aurora · Lumen</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="menubtn" id="menubtn" aria-label="Menu"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
        <div class="crumb" id="crumb"></div>
        <div class="t-actions">
          <a class="tbtn" href="/" title="Back to dashboard"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 10.5 12 3.5l8.5 7"/><path d="M5.5 9.2V19a1.3 1.3 0 0 0 1.3 1.3h10.4A1.3 1.3 0 0 0 18.5 19V9.2"/></svg><span>Dashboard</span></a>
          <button class="tbtn icon" id="hlbtn" aria-label="High-legibility font" aria-pressed="false" title="High-legibility font (Atkinson Hyperlegible)"><span style="font-weight:600;font-size:13px">Aa</span></button>
          <button class="tbtn icon" id="themebtn" aria-label="Toggle theme" title="Toggle light / dark"></button>
        </div>
      </header>
      <main class="page" id="page"></main>
    </div>
    <div class="scrim" id="scrim"></div>
  </div>
  <script src="./ds-docs.js"></script>
</body>
</html>
